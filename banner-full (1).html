<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>예술인의 목소리</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --lime:#CCFF00;--orange:#FF6B2B;--green:#1A8C5A;
  --ink:#111;--bg:#F5F2EB;--sur:#fff;
  --serif:'Noto Serif KR',serif;--sans:'Noto Sans KR',sans-serif;
}
body{margin:0;padding:0;background:var(--bg);font-family:var(--sans);}

/* 헤더 */
.hdr{background:var(--ink);display:flex;align-items:stretch;height:48px;}
.brand{background:var(--ink);color:#fff;padding:0 1.25rem;display:flex;align-items:center;gap:8px;white-space:nowrap;text-decoration:none;cursor:pointer;}
.brand-t{font-family:var(--serif);font-size:13px;font-weight:700;color:#fff;}
.dot{width:6px;height:6px;border-radius:50%;background:var(--lime);animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}
.tag{background:var(--lime);color:var(--ink);font-size:9px;font-weight:700;padding:3px 8px;letter-spacing:.06em;}

/* 설문 카드들 */
.surveys{display:flex;gap:0;border-top:2px solid var(--ink);}
.sv-card{flex:1;background:var(--sur);padding:12px 16px;cursor:pointer;border-right:1px solid rgba(17,17,17,.1);transition:background .1s;position:relative;}
.sv-card:last-child{border-right:none;}
.sv-card:hover{background:var(--lime);}
.sv-num{font-size:9px;font-weight:700;color:var(--orange);letter-spacing:.08em;margin-bottom:5px;text-transform:uppercase;}
.sv-q{font-family:var(--serif);font-size:13px;font-weight:700;color:var(--ink);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.sv-arrow{position:absolute;bottom:10px;right:12px;font-size:14px;color:var(--orange);}
.loading{padding:16px;font-size:12px;color:rgba(17,17,17,.4);text-align:center;}
.empty{padding:16px;font-size:12px;color:rgba(17,17,17,.4);text-align:center;}
</style>
</head>
<body>

<div class="hdr">
  <div class="brand" onclick="window.open('https://artists-voice.pages.dev','_blank')">
    <span class="brand-t" id="brand-txt">예술인의 목소리</span>
    <span class="dot"></span>
  </div>
  <div style="flex:1;display:flex;align-items:center;padding:0 1rem;">
    <span class="tag" id="hdr-sub">설문 진행 중</span>
  </div>
  <div style="display:flex;align-items:center;padding:0 1rem;">
    <a href="https://artists-voice.pages.dev" target="_blank" style="font-size:11px;font-weight:700;color:var(--lime);text-decoration:none;letter-spacing:.04em;">참여하기 →</a>
  </div>
</div>

<div class="surveys" id="surveys-wrap">
  <div class="loading">설문을 불러오는 중...</div>
</div>

<script>
var SB  = 'https://ekwqfkcfeehhssxkzrxm.supabase.co';
var KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVrd3Fma2NmZWVoaHNzeGt6cnhtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4NTk4OTksImV4cCI6MjA5NTQzNTg5OX0.js2SaqzgE8nI6EV6DO_lNscNTRSQuCKczmwIbucXrU8';

function api(path){
  return fetch(SB+'/rest/v1/'+path,{
    headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}
  });
}

async function load(){
  try {
    var [sr, qr] = await Promise.all([
      api('settings?select=key,value'),
      api('surveys?select=id,question,type&status=eq.현재&order=created_at.asc')
    ]);
    var settings = await sr.json();
    var surveys  = await qr.json();

    var m={};
    settings.forEach(function(s){m[s.key]=s.value;});
    document.getElementById('brand-txt').textContent = '예술인의 목소리';

    var wrap = document.getElementById('surveys-wrap');
    if(!surveys||surveys.length===0){
      wrap.innerHTML='<div class="empty">현재 진행 중인 설문이 없습니다</div>';
      return;
    }

    wrap.innerHTML = surveys.map(function(s,i){
      return '<div class="sv-card" onclick="window.open(\'https://artists-voice.pages.dev\',\'_blank\')">' +
        '<p class="sv-num">설문 0'+(i+1)+'</p>' +
        '<p class="sv-q">'+s.question+'</p>' +
        '<span class="sv-arrow">→</span>' +
      '</div>';
    }).join('');
  } catch(e) {
    document.getElementById('surveys-wrap').innerHTML='<div class="empty">불러오지 못했습니다</div>';
  }
}

load();
</script>
</body>
</html>
