<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta property="og:title" content="예술인의 목소리 설문">
<meta property="og:description" content="공공예술기관 대표 임명, 당신의 생각은 무엇입니까?">
<title>예술인의 목소리</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --lime:#CCFF00;--orange:#FF6B2B;--green:#1A8C5A;--green-lt:#E8F9F0;
  --ink:#111;--bg:#F5F2EB;--sur:#fff;
  --sh:5px 5px 0 #111;--sh2:3px 3px 0 #111;
  --serif:'Noto Serif KR',serif;--sans:'Noto Sans KR',sans-serif;
}
body{background:var(--bg);font-family:var(--sans);min-height:100vh;overflow-x:hidden;}
.hdr{background:var(--ink);display:flex;align-items:stretch;position:sticky;top:0;z-index:10;}
.stripes{display:flex;flex:1;overflow:hidden;}
.s{height:52px;flex:1;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;letter-spacing:.07em;color:var(--ink);padding:0 4px;text-align:center;}
.s:nth-child(1){background:var(--lime);}
.s:nth-child(2){background:var(--green);color:#fff;}
.s:nth-child(3){background:var(--orange);color:#fff;}
.s:nth-child(4){background:var(--lime);}
.brand{background:var(--ink);color:#fff;padding:0 1.25rem;display:flex;align-items:center;gap:8px;white-space:nowrap;flex-shrink:0;}
.brand-t{font-family:var(--serif);font-size:13px;font-weight:700;}
.dot{width:7px;height:7px;border-radius:50%;background:var(--lime);animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}
main{max-width:600px;margin:0 auto;padding:2.5rem 1.25rem 6rem;}
.sv-block{margin-bottom:2rem;}
.sv-tag{display:inline-block;background:var(--lime);color:var(--ink);font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:5px 12px;margin-bottom:1.25rem;transform:rotate(-.3deg);}
.sv-card{background:var(--sur);border:2px solid var(--ink);padding:2rem 1.75rem 1.75rem;box-shadow:var(--sh);}
.q{font-family:var(--serif);font-size:17px;font-weight:700;line-height:1.75;color:var(--ink);margin-bottom:1.75rem;}
.opts{display:flex;flex-direction:column;gap:9px;margin-bottom:1.5rem;}
.opt{display:flex;align-items:center;gap:14px;padding:13px 16px;border:1.5px solid var(--ink);cursor:pointer;background:transparent;text-align:left;width:100%;font-family:var(--sans);transition:all .1s;}
.opt:hover{background:var(--lime);transform:translate(-2px,-2px);box-shadow:var(--sh2);}
.opt.sel{background:var(--green);border-color:var(--green);transform:translate(-2px,-2px);box-shadow:var(--sh2);}
.opt-n{font-size:11px;font-weight:700;color:rgba(17,17,17,.2);min-width:22px;}
.opt.sel .opt-n{color:rgba(255,255,255,.4);}
.opt-t{font-size:14px;font-weight:500;color:var(--ink);line-height:1.5;}
.opt.sel .opt-t{color:#fff;font-weight:700;}
.subj{width:100%;padding:14px;border:1.5px solid var(--ink);font-size:14px;font-family:var(--sans);resize:vertical;min-height:110px;line-height:1.6;margin-bottom:1.5rem;}
.subj:focus{outline:none;border-color:var(--green);}
.sbtn{width:100%;padding:14px;background:var(--ink);color:#fff;border:2px solid var(--ink);font-size:14px;font-weight:700;font-family:var(--sans);cursor:pointer;transition:all .1s;letter-spacing:.03em;}
.sbtn:hover:not(:disabled){background:var(--orange);border-color:var(--orange);transform:translate(-2px,-2px);box-shadow:var(--sh2);}
.sbtn:disabled{opacity:.2;cursor:default;}
.voted-badge{font-family:var(--serif);font-size:14px;font-weight:700;color:var(--green);padding:14px;border:1.5px solid var(--green);background:var(--green-lt);text-align:center;}
.res-card{background:var(--sur);border:2px solid var(--ink);border-top:none;padding:1.75rem;box-shadow:var(--sh);}
.res-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;}
.res-title{font-family:var(--serif);font-size:14px;font-weight:700;}
.res-cnt{background:var(--lime);color:var(--ink);font-size:11px;font-weight:700;padding:4px 10px;border:1.5px solid var(--ink);}
.bar-row{margin-bottom:13px;}
.bar-meta{display:flex;justify-content:space-between;margin-bottom:5px;}
.bar-lbl{font-size:12px;font-weight:500;color:var(--ink);line-height:1.4;max-width:75%;}
.bar-lbl.mine{font-weight:700;color:var(--green);}
.bar-pct{font-size:13px;font-weight:700;color:var(--ink);}
.bar-track{height:9px;background:#E8E4DC;border:1.5px solid var(--ink);overflow:hidden;}
.bar-fill{height:100%;background:var(--orange);width:0%;transition:width 1s cubic-bezier(.4,0,.2,1);}
.bar-fill.mine{background:var(--green);}
.subj-done{font-family:var(--serif);font-size:14px;font-weight:700;color:var(--green);padding:14px;border:1.5px solid var(--green);text-align:center;margin-bottom:1rem;}
.view-btn{width:100%;padding:12px;background:transparent;color:var(--ink);border:1.5px solid var(--ink);font-size:13px;font-weight:700;font-family:var(--sans);cursor:pointer;margin-top:1rem;transition:all .1s;}
.view-btn:hover{background:var(--lime);transform:translate(-1px,-1px);box-shadow:2px 2px 0 var(--ink);}
.share-wrap{margin-top:1.5rem;padding-top:1.5rem;border-top:1.5px dashed rgba(17,17,17,.15);}
.share-lbl{font-size:10px;font-weight:700;letter-spacing:.1em;color:var(--ink);margin-bottom:10px;text-transform:uppercase;}
.share-row{display:flex;gap:8px;}
.sh-btn{flex:1;padding:10px 6px;background:transparent;border:1.5px solid var(--ink);font-size:11px;font-weight:700;color:var(--ink);cursor:pointer;font-family:var(--sans);transition:all .1s;}
.sh-btn:nth-child(1):hover{background:var(--lime);}
.sh-btn:nth-child(2):hover{background:var(--green);color:#fff;}
.sh-btn:nth-child(3):hover{background:var(--orange);color:#fff;}
.notice{text-align:center;font-size:11px;color:rgba(17,17,17,.35);margin-top:1.25rem;padding:10px;border:1px dashed rgba(17,17,17,.12);}
.arch-sec{margin-top:3.5rem;}
.sec-head{font-family:var(--serif);font-size:13px;font-weight:700;color:var(--ink);margin-bottom:1rem;display:flex;align-items:center;gap:10px;}
.sec-head::after{content:'';flex:1;height:2px;background:var(--ink);}
.arch-item{padding:1.25rem 1.25rem 1.25rem 1rem;border-left:4px solid var(--lime);margin-bottom:10px;background:var(--sur);border-top:1px solid rgba(17,17,17,.08);border-right:1px solid rgba(17,17,17,.08);border-bottom:1px solid rgba(17,17,17,.08);cursor:pointer;transition:all .1s;}
.arch-item:hover{border-left-color:var(--orange);transform:translateX(3px);}
.arch-date{font-size:10px;font-weight:700;color:rgba(17,17,17,.35);margin-bottom:5px;}
.arch-q{font-family:var(--serif);font-size:14px;font-weight:700;color:var(--ink);line-height:1.6;margin-bottom:8px;}
.arch-sum{font-size:11px;color:rgba(17,17,17,.45);}
.arch-bars{display:flex;gap:2px;margin-top:9px;height:5px;border:1.5px solid var(--ink);overflow:hidden;}
.arch-seg{height:100%;}
.arch-seg:nth-child(1){background:var(--green);}
.arch-seg:nth-child(2){background:var(--orange);}
.arch-seg:nth-child(3){background:var(--lime);}
.loading{text-align:center;padding:4rem 1rem;font-family:var(--serif);font-size:15px;color:rgba(17,17,17,.4);animation:fade 1.5s infinite;}
@keyframes fade{0%,100%{opacity:.4;}50%{opacity:1;}}
.err-box{background:var(--sur);border:2px solid var(--orange);padding:1.5rem;text-align:center;color:var(--orange);font-size:13px;}
.empty{text-align:center;padding:3rem 1rem;font-family:var(--serif);font-size:15px;color:rgba(17,17,17,.4);}
footer{background:var(--ink);color:rgba(255,255,255,.35);text-align:center;padding:1.75rem;font-size:11px;font-weight:700;letter-spacing:.06em;}

/* 답변 모달 */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;align-items:center;justify-content:center;padding:1rem;}
.modal-overlay.open{display:flex;}
.modal{background:var(--sur);border:2px solid var(--ink);box-shadow:var(--sh);width:100%;max-width:520px;max-height:85vh;overflow-y:auto;}
.modal-hdr{background:var(--ink);color:#fff;padding:1.25rem 1.5rem;display:flex;justify-content:space-between;align-items:center;}
.modal-title{font-family:var(--serif);font-size:14px;font-weight:700;}
.modal-close{background:none;border:none;color:#fff;font-size:22px;cursor:pointer;opacity:.6;padding:0;line-height:1;}
.modal-body{padding:1.5rem;}
.ans-item{padding:12px 14px;border-left:3px solid var(--lime);margin-bottom:10px;background:var(--bg);font-size:13px;line-height:1.6;}
.ans-date{font-size:10px;color:rgba(17,17,17,.35);margin-top:5px;font-weight:700;}
.ans-empty{text-align:center;padding:2rem;font-size:13px;color:rgba(17,17,17,.4);}

.adm-fab{position:fixed;bottom:1.5rem;right:1.5rem;width:44px;height:44px;background:var(--ink);border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(0,0,0,.25);transition:transform .1s;text-decoration:none;opacity:0.4;}
.adm-fab:hover{transform:scale(1.1);opacity:1;}
.adm-fab svg{width:18px;height:18px;}
@media(max-width:480px){
  .s{font-size:9px;}
  .brand{padding:0 1rem;}
  main{padding:2rem 1rem 5rem;}
  .sv-card{padding:1.5rem 1.25rem;}
  .q{font-size:15px;}
}
</style>
</head>
<body>
<header class="hdr">
  <div class="stripes">
    <div class="s" id="s1">예술인의 목소리</div>
    <div class="s" id="s2">공공기관 대표 임명</div>
    <div class="s" id="s3">6월 22일 포럼</div>
    <div class="s" id="s4">씨어터 광장</div>
  </div>
  <div class="brand">
    <span class="brand-t">예술인의 목소리</span>
    <span class="dot"></span>
  </div>
</header>

<main>
  <div id="surveys-wrap"><div class="loading">설문을 불러오는 중...</div></div>
  <div id="archive-wrap"></div>
</main>

<footer id="footer-txt">예술인의 목소리 · 씨어터 광장, 대학로예술극장 1층</footer>

<!-- 답변 모달 -->
<div class="modal-overlay" id="ans-overlay">
  <div class="modal">
    <div class="modal-hdr">
      <span class="modal-title" id="ans-title">답변 목록</span>
      <button class="modal-close" onclick="document.getElementById('ans-overlay').classList.remove('open')">✕</button>
    </div>
    <div class="modal-body" id="ans-body"></div>
  </div>
</div>

<script>
var SB  = 'https://ekwqfkcfeehhssxkzrxm.supabase.co';
var KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVrd3Fma2NmZWVoaHNzeGt6cnhtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4NTk4OTksImV4cCI6MjA5NTQzNTg5OX0.js2SaqzgE8nI6EV6DO_lNscNTRSQuCKczmwIbucXrU8';
var _sv = {};
var _sel = {};
var _archIds = [];

function api(path, opts) {
  var o = opts || {};
  o.headers = Object.assign({'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json','Prefer':'return=representation'}, o.headers||{});
  return fetch(SB+'/rest/v1/'+path, o);
}

function voted(id)      { return localStorage.getItem('v_'+id)!==null; }
function setVoted(id,i) { localStorage.setItem('v_'+id,String(i)); }
function myVote(id)     { var v=localStorage.getItem('v_'+id); return v!==null?parseInt(v):-1; }

async function loadAll() {
  try {
    var [sr,qr,rr] = await Promise.all([
      api('settings?select=key,value'),
      api('surveys?select=*&order=created_at.asc'),
      api('responses?select=survey_id,answer')
    ]);
    applySettings(await sr.json());
    var surveys  = await qr.json();
    var responses= await rr.json();
    var counts={};
    responses.forEach(function(r){
      if(!counts[r.survey_id]) counts[r.survey_id]={};
      counts[r.survey_id][r.answer]=(counts[r.survey_id][r.answer]||0)+1;
    });
    var cur  = surveys.filter(function(s){return s.status==='현재';});
    var arch = surveys.filter(function(s){return s.status==='지난';});
    var wrap = document.getElementById('surveys-wrap');
    if(cur.length===0){
      wrap.innerHTML='<div class="empty">현재 진행 중인 설문이 없습니다</div>';
    } else {
      wrap.innerHTML='';
      cur.forEach(function(s){
        var opts=[s.option1,s.option2,s.option3,s.option4].filter(Boolean);
        var cnt=opts.map(function(o){return (counts[s.id]||{})[o]||0;});
        _sv[s.id]={id:s.id,q:s.question,type:s.type,opts:opts,cnt:cnt};
        var d=document.createElement('div');
        d.className='sv-block';
        wrap.appendChild(d);
        renderBlock(s.id,d);
      });
    }
    renderArch(arch,counts);
  } catch(e) {
    document.getElementById('surveys-wrap').innerHTML='<div class="err-box">설문을 불러오지 못했습니다. 잠시 후 다시 시도해주세요.</div>';
  }
}

function applySettings(arr){
  var m={};arr.forEach(function(a){m[a.key]=a.value;});
  applyStripe('s1', m.header1, m.header1url);
  applyStripe('s2', m.header2, m.header2url);
  applyStripe('s3', m.header3, m.header3url);
  applyStripe('s4', m.header4, m.header4url);
  if(m.footer) document.getElementById('footer-txt').textContent=m.footer;
}

function applyStripe(id, text, url) {
  var el = document.getElementById(id);
  if(!el) return;
  if(text) {
    if(url && url.trim()) {
      el.innerHTML = '<a href="'+url.trim()+'" target="_blank" rel="noopener" style="color:inherit;text-decoration:none;display:block;width:100%;height:100%;display:flex;align-items:center;justify-content:center;">'+text+'</a>';
    } else {
      el.textContent = text;
    }
  }
}

function renderBlock(id,container){
  var s=_sv[id];
  var isVoted=voted(id);
  var mv=myVote(id);
  var total=s.cnt.reduce(function(a,b){return a+b;},0);
  var html='<span class="sv-tag">현재 설문</span>';
  if(isVoted && s.type!=='주관식'){
    html+='<div class="sv-card"><p class="q">'+s.q+'</p><div class="voted-badge">설문에 응답하셨습니다 ✓</div></div>'+resCardHTML(id,total);
    container.innerHTML=html;
    drawBars(id,s.cnt,mv,true);
  } else if(isVoted && s.type==='주관식'){
    html+='<div class="sv-card"><p class="q">'+s.q+'</p><div class="voted-badge">설문에 응답하셨습니다 ✓</div></div><div class="res-card"><div class="subj-done">답변이 전달되었습니다 ✓</div><button class="view-btn" onclick="openAns(\''+id+'\')">모든 답변 보기 →</button>'+shareHTML()+'</div>';
    container.innerHTML=html;
  } else {
    var inp='';
    if(s.type==='주관식'){
      inp='<textarea class="subj" id="subj-'+id+'" placeholder="여기에 답변을 입력해주세요..."></textarea>';
    } else {
      inp='<div class="opts">'+s.opts.map(function(o,i){
        return '<button class="opt" id="opt-'+id+'-'+i+'" onclick="pick(\''+id+'\','+i+')"><span class="opt-n">0'+(i+1)+'</span><span class="opt-t">'+o+'</span></button>';
      }).join('')+'</div>';
    }
    html+='<div class="sv-card"><p class="q">'+s.q+'</p>'+inp+'<button class="sbtn" id="sbtn-'+id+'" disabled onclick="submit(\''+id+'\')">답하기 →</button></div>';
    html+='<div class="res-card" id="res-'+id+'" style="display:none"><div class="res-hdr"><span class="res-title">지금까지의 응답</span><span class="res-cnt" id="cnt-'+id+'">총 '+total+'명</span></div><div id="bars-'+id+'"></div>'+shareHTML()+'</div>';
    container.innerHTML=html;
    if(s.type==='주관식'){
      document.getElementById('subj-'+id).addEventListener('input',function(){
        document.getElementById('sbtn-'+id).disabled=this.value.trim()==='';
      });
    }
  }
}

function resCardHTML(id,total){
  return '<div class="res-card" id="res-'+id+'"><div class="res-hdr"><span class="res-title">지금까지의 응답</span><span class="res-cnt" id="cnt-'+id+'">총 '+total+'명</span></div><div id="bars-'+id+'"></div>'+shareHTML()+'</div>';
}

function shareHTML(){
  return '<div class="share-wrap"><p class="share-lbl">이 설문 공유하기</p><div class="share-row"><button class="sh-btn" onclick="copyURL(this)">링크 복사</button><button class="sh-btn" onclick="shareKakao()">카카오톡</button><button class="sh-btn" onclick="shareX()">X 공유</button></div></div><p class="notice">설문은 비정기적으로 업데이트됩니다</p>';
}

function pick(id,idx){
  if(voted(id))return;
  _sel[id]=idx;
  var s=_sv[id];
  s.opts.forEach(function(_,i){var el=document.getElementById('opt-'+id+'-'+i);if(el)el.classList.toggle('sel',i===idx);});
  document.getElementById('sbtn-'+id).disabled=false;
}

async function submit(id){
  var s=_sv[id];
  if(!s||voted(id))return;
  var ans='';
  if(s.type==='주관식'){ans=document.getElementById('subj-'+id).value.trim();if(!ans)return;}
  else{if(_sel[id]===undefined)return;ans=s.opts[_sel[id]];}
  var btn=document.getElementById('sbtn-'+id);
  btn.textContent='전송 중...';btn.disabled=true;
  try{await api('responses',{method:'POST',body:JSON.stringify({survey_id:id,answer:ans})});}catch(e){}
  var si=s.type==='주관식'?-1:_sel[id];
  setVoted(id,si);
  btn.textContent='응답 완료 ✓';
  if(s.type==='주관식'){
    document.getElementById('subj-'+id).disabled=true;
    var rs=document.getElementById('res-'+id);
    if(rs){rs.innerHTML='<div class="subj-done">답변이 전달되었습니다 ✓</div><button class="view-btn" onclick="openAns(\''+id+'\')">모든 답변 보기 →</button>'+shareHTML();rs.style.display='block';}
  } else {
    s.cnt[si]+=1;
    var rs2=document.getElementById('res-'+id);
    var ce=document.getElementById('cnt-'+id);
    if(rs2)rs2.style.display='block';
    if(ce)ce.textContent='총 '+s.cnt.reduce(function(a,b){return a+b;},0)+'명';
    drawBars(id,s.cnt,si,false);
    if(rs2)setTimeout(function(){rs2.scrollIntoView({behavior:'smooth',block:'nearest'});},100);
  }
}

function drawBars(id,cnt,mv,instant){
  var s=_sv[id];if(!s)return;
  var el=document.getElementById('bars-'+id);if(!el)return;
  var total=cnt.reduce(function(a,b){return a+b;},0);
  el.innerHTML='';
  cnt.forEach(function(c,i){
    var pct=total>0?Math.round(c/total*100):0;
    var me=i===mv;
    var d=document.createElement('div');d.className='bar-row';
    d.innerHTML='<div class="bar-meta"><span class="bar-lbl'+(me?' mine':'')+'">'+s.opts[i]+(me?' ✓':'')+'</span><span class="bar-pct">'+pct+'%</span></div><div class="bar-track"><div class="bar-fill'+(me?' mine':'')+'" id="bf-'+id+'-'+i+'" style="width:'+(instant?pct+'%':'0%')+'"></div></div>';
    el.appendChild(d);
  });
  if(!instant)setTimeout(function(){
    var t2=cnt.reduce(function(a,b){return a+b;},0);
    cnt.forEach(function(c,i){var pct=t2>0?Math.round(c/t2*100):0;var b=document.getElementById('bf-'+id+'-'+i);if(b)b.style.width=pct+'%';});
  },60);
}

function renderArch(items,counts){
  var wrap=document.getElementById('archive-wrap');
  if(!items||items.length===0){wrap.innerHTML='';return;}
  _archIds=[];
  items.forEach(function(item,idx){
    var opts=[item.option1,item.option2,item.option3,item.option4].filter(Boolean);
    var cnt=opts.map(function(o){return (counts[item.id]||{})[o]||0;});
    _sv[item.id]={id:item.id,q:item.question,type:item.type,opts:opts,cnt:cnt};
    _archIds.push(item.id);
  });
  var html='<div class="arch-sec"><p class="sec-head">지난 설문</p>';
  items.forEach(function(item,idx){
    var opts=[item.option1,item.option2,item.option3,item.option4].filter(Boolean);
    var cnt=opts.map(function(o){return (counts[item.id]||{})[o]||0;});
    var total=cnt.reduce(function(a,b){return a+b;},0);
    var segs=cnt.map(function(c){return '<div class="arch-seg" style="flex:'+(total>0?c:1)+';"></div>';}).join('');
    var top=opts[0]&&total>0?opts[0]+' '+Math.round(cnt[0]/total*100)+'%':'응답 없음';
    html+='<div class="arch-item" onclick="showArchRes('+idx+')"><p class="arch-date">'+(item.date||'')+'</p><p class="arch-q">'+item.question+'</p><p class="arch-sum">총 '+total+'명 응답 · '+top+' <span style="color:var(--orange);font-weight:700;">결과 보기 →</span></p><div class="arch-bars">'+segs+'</div></div>';
  });
  html+='</div>';
  wrap.innerHTML=html;
}

function showArchRes(idx){
  var id=_archIds[idx];var s=_sv[id];if(!s)return;
  var total=s.cnt.reduce(function(a,b){return a+b;},0);
  document.getElementById('ans-title').textContent=s.q.length>28?s.q.substring(0,28)+'...':s.q;
  document.getElementById('ans-overlay').classList.add('open');
  var body=document.getElementById('ans-body');
  if(s.type==='주관식'){
    body.innerHTML='<div class="loading">불러오는 중...</div>';
    api('responses?survey_id=eq.'+id+'&order=created_at.desc&select=answer,created_at').then(function(r){return r.json();}).then(function(data){
      if(data.length===0){body.innerHTML='<div class="ans-empty">답변이 없습니다</div>';return;}
      body.innerHTML='<p style="font-size:11px;font-weight:700;color:rgba(17,17,17,.4);margin-bottom:1rem;">총 '+data.length+'개의 답변</p>'+data.map(function(item){var d=new Date(item.created_at);return '<div class="ans-item">'+item.answer+'<p class="ans-date">'+d.getFullYear()+'.'+(d.getMonth()+1).toString().padStart(2,'0')+'.'+d.getDate().toString().padStart(2,'0')+'</p></div>';}).join('');
    });
  } else {
    var bars='<p style="font-family:var(--serif);font-size:14px;font-weight:700;color:var(--ink);margin-bottom:1.25rem;line-height:1.6;">'+s.q+'</p><p style="font-size:11px;font-weight:700;color:rgba(17,17,17,.4);margin-bottom:1rem;">총 '+total+'명 응답</p>';
    s.cnt.forEach(function(c,i){var pct=total>0?Math.round(c/total*100):0;bars+='<div class="bar-row"><div class="bar-meta"><span class="bar-lbl">'+s.opts[i]+'</span><span class="bar-pct">'+pct+'% ('+c+'명)</span></div><div class="bar-track"><div class="bar-fill" id="abf-'+id+'-'+i+'" style="width:0%"></div></div></div>';});
    body.innerHTML=bars;
    setTimeout(function(){s.cnt.forEach(function(c,i){var pct=total>0?Math.round(c/total*100):0;var b=document.getElementById('abf-'+id+'-'+i);if(b)b.style.width=pct+'%';});},60);
  }
}

function openAns(id){
  var s=_sv[id];
  document.getElementById('ans-title').textContent=s&&s.q.length>28?s.q.substring(0,28)+'...':s?s.q:'답변 목록';
  document.getElementById('ans-overlay').classList.add('open');
  var body=document.getElementById('ans-body');
  body.innerHTML='<div class="loading">불러오는 중...</div>';
  api('responses?survey_id=eq.'+id+'&order=created_at.desc&select=answer,created_at').then(function(r){return r.json();}).then(function(data){
    if(data.length===0){body.innerHTML='<div class="ans-empty">아직 답변이 없습니다</div>';return;}
    body.innerHTML='<p style="font-size:11px;font-weight:700;color:rgba(17,17,17,.4);margin-bottom:1rem;">총 '+data.length+'개의 답변</p>'+data.map(function(item){var d=new Date(item.created_at);return '<div class="ans-item">'+item.answer+'<p class="ans-date">'+d.getFullYear()+'.'+(d.getMonth()+1).toString().padStart(2,'0')+'.'+d.getDate().toString().padStart(2,'0')+'</p></div>';}).join('');
  });
}

function copyURL(btn){navigator.clipboard.writeText(window.location.href).then(function(){var o=btn.textContent;btn.textContent='복사됨 ✓';setTimeout(function(){btn.textContent=o;},1800);});}
function shareKakao(){if(navigator.share)navigator.share({title:'예술인의 목소리',text:'공공예술기관 대표 임명, 당신의 생각은?',url:window.location.href});else navigator.clipboard.writeText(window.location.href);}
function shareX(){window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent('예술인의 목소리 설문')+'&url='+encodeURIComponent(window.location.href),'_blank');}

document.getElementById('ans-overlay').onclick=function(e){if(e.target===this)this.classList.remove('open');};
loadAll();

</script>
