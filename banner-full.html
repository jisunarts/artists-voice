<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>예술인의 목소리</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--lime:#CCFF00;--orange:#FF6B2B;--green:#1A8C5A;--ink:#111;--bg:#F5F2EB;--sur:#fff;--serif:'Noto Serif KR',serif;--sans:'Noto Sans KR',sans-serif;}
body{margin:0;padding:0;background:var(--bg);font-family:var(--sans);}
.hdr{background:var(--ink);display:flex;align-items:stretch;height:52px;}
.left{background:var(--lime);height:100%;display:flex;align-items:center;padding:0 1.25rem;flex-shrink:0;}
.left-t{font-family:var(--serif);font-size:14px;font-weight:700;color:var(--ink);}
.mid{flex:1;padding:0 1.25rem;display:flex;align-items:center;gap:10px;}
.dot{width:6px;height:6px;border-radius:50%;background:var(--lime);animation:blink 2s infinite;flex-shrink:0;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}
.tag{background:rgba(255,255,255,.1);color:rgba(255,255,255,.6);font-size:10px;font-weight:700;padding:3px 8px;letter-spacing:.06em;}
.right{background:var(--orange);height:100%;display:flex;align-items:center;padding:0 1.25rem;flex-shrink:0;text-decoration:none;}
.right-t{font-size:12px;font-weight:700;color:#fff;white-space:nowrap;}
.surveys{display:flex;border-top:2px solid var(--ink);}
.sv-card{flex:1;background:var(--sur);padding:14px 16px 28px;cursor:pointer;border-right:1px solid rgba(17,17,17,.1);transition:background .1s;position:relative;}
.sv-card:last-child{border-right:none;}
.sv-card:hover{background:var(--lime);}
.sv-num{font-size:9px;font-weight:700;color:var(--orange);letter-spacing:.08em;margin-bottom:6px;text-transform:uppercase;}
.sv-q{font-family:var(--serif);font-size:13px;font-weight:700;color:var(--ink);line-height:1.6;}
.sv-arrow{position:absolute;bottom:10px;right:12px;font-size:14px;color:var(--orange);}
.empty{padding:16px;font-size:12px;color:rgba(17,17,17,.4);text-align:center;}
</style>
</head>
<body>
<div class="hdr">
  <div class="left"><span class="left-t">예술인의 목소리</span></div>
  <div class="mid">
    <span class="dot"></span>
    <span class="tag">설문 진행 중</span>
  </div>
  <a href="https://artists-voice.pages.dev" target="_blank" class="right">
    <span class="right-t">참여하기 →</span>
  </a>
</div>
<div class="surveys" id="surveys-wrap">
  <div class="empty">불러오는 중...</div>
</div>
<script>
var SB='https://ekwqfkcfeehhssxkzrxm.supabase.co';
var KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVrd3Fma2NmZWVoaHNzeGt6cnhtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4NTk4OTksImV4cCI6MjA5NTQzNTg5OX0.js2SaqzgE8nI6EV6DO_lNscNTRSQuCKczmwIbucXrU8';
fetch(SB+'/rest/v1/surveys?select=id,question&status=eq.현재&order=created_at.asc',{
  headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}
}).then(function(r){return r.json();}).then(function(data){
  var wrap=document.getElementById('surveys-wrap');
  if(!data||data.length===0){wrap.innerHTML='<div class="empty">현재 진행 중인 설문이 없습니다</div>';return;}
  wrap.innerHTML=data.map(function(s,i){
    return '<div class="sv-card" onclick="window.open(\'https://artists-voice.pages.dev\',\'_blank\')">'
      +'<p class="sv-num">설문 0'+(i+1)+'</p>'
      +'<p class="sv-q">'+s.question+'</p>'
      +'<span class="sv-arrow">→</span>'
      +'</div>';
  }).join('');
}).catch(function(){
  document.getElementById('surveys-wrap').innerHTML='<div class="empty">불러오지 못했습니다</div>';
});
</script>
</body>
</html>
